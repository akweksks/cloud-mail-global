name = "cloud-mail-global"
main = "src/index.js"
compatibility_date = "2025-06-04"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[observability]
enabled = true

#[[d1_databases]]
#binding = "db"			# D1 database binding (do not change)
#database_name = ""		# Your D1 database name
#database_id = ""		# Your D1 database ID

#[[kv_namespaces]]
#binding = "kv"			# KV binding (do not change)
#id = ""				# Your KV namespace ID

#[[r2_buckets]]
#binding = "r2"			# R2 binding (do not change)
#bucket_name = ""		# Your R2 bucket name

[assets]
binding = "assets"
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	# Daily housekeeping at 16:00 UTC

# Uncomment to enable Cloudflare Email Service for outbound sending
#[[send_email]]
#name = "EMAIL"

# --- AI Email Agent (optional, requires Workers AI access) ---
# Uncomment to enable the AIChatAgent side panel + auto-draft on inbound email.
# Model: @cf/moonshotai/kimi-k2.5
#[ai]
#binding = "AI"

#[[durable_objects.bindings]]
#name = "EMAIL_AGENT"
#class_name = "EmailAgent"

#[[migrations]]
#tag = "v1-add-email-agent"
#new_sqlite_classes = ["EmailAgent"]

#[vars]
#orm_log = false
#domain = '["example.com"]'	# Your email domains (array)
#admin = "admin@example.com"	# Admin email address
#jwt_secret = ""				# Random string for JWT signing

# >>> cloud-mail-deploy >>>
[[d1_databases]]
binding = "db"
database_name = "cloud-mail-global"
database_id = "edd2f7f2-b955-40a2-bca6-2e0d5b6ccf7f"

[[kv_namespaces]]
binding = "kv"
id = "e9055f58f742418eb8ccb25e88a34b6a"

[[r2_buckets]]
binding = "r2"
bucket_name = "cloud-mail-global-r2"

[[send_email]]
name = "EMAIL"

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "EMAIL_AGENT"
class_name = "EmailAgent"

[[migrations]]
tag = "v1-add-email-agent"
new_sqlite_classes = ["EmailAgent"]

[vars]
orm_log = false
domain = '["citicstrust.com","boo.edu.kg"]'
admin = "admin@citicstrust.com"
# <<< cloud-mail-deploy <<<

[build]
command = "pnpm --prefix ../mail-vue install && pnpm --prefix ../mail-vue run build"
